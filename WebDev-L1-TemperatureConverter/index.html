<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter | OIBSIP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="converter">
    <h1>Temperature Converter</h1>
    <p class="subtitle">Convert between Celsius, Fahrenheit, and Kelvin</p>

    <form id="converter-form">
      <label for="temperature">Temperature</label>
      <input type="text" id="temperature" placeholder="Enter a number" />

      <label for="input-unit">Input Unit</label>
      <select id="input-unit">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>

      <button type="submit" class="btn">Convert</button>
    </form>

    <p id="error" class="error" hidden></p>

    <section id="results" class="results" hidden>
      <h2>Results</h2>
      <p id="celsius-result"></p>
      <p id="fahrenheit-result"></p>
      <p id="kelvin-result"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
